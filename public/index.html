<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Chat</title>
<style>
  :root {
    --bg: #ffffff; --bg2: #f4f4f5; --bg3: #e4e4e7; --border: #d4d4d8;
    --text: #18181b; --text2: #71717a; --accent: #4f9ef8; --accent-hover: #3b82f6;
    --reply-bg: #f0f9ff; --reply-border: #93c5fd;
    --shadow: rgba(0,0,0,0.10); --emoji-bg: #ffffff;
    --highlight: #fef9c3; --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111113; --bg2: #1c1c1f; --bg3: #27272a; --border: #3f3f46;
      --text: #fafafa; --text2: #a1a1aa; --accent: #4f9ef8; --accent-hover: #60a5fa;
      --reply-bg: #1e2d3d; --reply-border: #3b82f6;
      --shadow: rgba(0,0,0,0.45); --emoji-bg: #27272a; --highlight: #3d3700;
    }
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; overflow: hidden; }

  /* ── Layout ────────────────────────────────────────────────── */
  #app { display: flex; height: 100dvh; overflow: hidden; position: relative; }

  /* ── Sidebar ───────────────────────────────────────────────── */
  #sidebar {
    width: 300px; background: var(--bg2); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
    transition: transform 0.22s ease;
  }
  .sidebar-header { display: flex; align-items: center; gap: 10px; padding: 14px 14px 10px; border-bottom: 1px solid var(--border); }
  .sidebar-header h1 { font-size: 16px; font-weight: 700; flex: 1; }
  #my-email-chip { font-size: 11px; color: var(--text2); background: var(--bg3); border-radius: 20px; padding: 3px 8px; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .search-box { padding: 10px 12px; display: flex; gap: 6px; }
  #user-search { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 13px; outline: none; min-width: 0; }
  #user-search:focus { border-color: var(--accent); }
  #search-go { background: var(--accent); border: none; border-radius: 8px; color: #fff; cursor: pointer; font-size: 13px; font-weight: 600; padding: 8px 14px; white-space: nowrap; }
  #search-go:active { background: var(--accent-hover); }
  #search-result { font-size: 12px; padding: 0 12px 8px; color: var(--text2); line-height: 1.5; }
  #search-result a { color: var(--accent); cursor: pointer; font-weight: 600; }

  .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text2); padding: 10px 14px 4px; font-weight: 700; }
  #convo-list, #online-list { overflow-y: auto; }
  #convo-list { max-height: 50%; }
  #online-list { flex: 1; overflow-y: auto; }

  .list-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    cursor: pointer; transition: background 0.12s; -webkit-tap-highlight-color: transparent;
  }
  .list-item:hover, .list-item:active { background: var(--bg3); }
  .list-item.active { background: var(--bg3); }
  .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .item-info { flex: 1; min-width: 0; }
  .item-email { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item-sub { font-size: 12px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 1px; }
  .item-time { font-size: 11px; color: var(--text2); flex-shrink: 0; }
  .online-dot { width: 9px; height: 9px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
  .offline-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--border); flex-shrink: 0; }

  .empty-list { padding: 10px 14px; font-size: 12px; color: var(--text2); }

  /* ── Main panel ─────────────────────────────────────────────── */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }

  /* ── Header ─────────────────────────────────────────────────── */
  #header {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    border-bottom: 1px solid var(--border); background: var(--bg);
    flex-shrink: 0; min-height: 54px;
  }
  #back-btn { display: none; background: none; border: none; cursor: pointer; color: var(--accent); font-size: 22px; line-height: 1; padding: 4px 8px 4px 0; -webkit-tap-highlight-color: transparent; }
  #menu-btn { display: none; background: none; border: none; cursor: pointer; color: var(--text); font-size: 22px; line-height: 1; padding: 4px; -webkit-tap-highlight-color: transparent; }
  #header-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
  #header-info { flex: 1; min-width: 0; }
  #header-email { font-size: 14px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #header-status { font-size: 11px; color: var(--text2); }
  #header-status.online { color: #22c55e; }
  #header-search-btn { background: none; border: 1px solid var(--border); border-radius: 7px; color: var(--text2); cursor: pointer; padding: 6px 10px; font-size: 13px; white-space: nowrap; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
  #header-search-btn:active { border-color: var(--accent); color: var(--accent); }
  #conn-status { font-size: 11px; padding: 3px 10px; border-radius: 20px; flex-shrink: 0; }
  .s-connected { background: #dcfce7; color: #16a34a; }
  .s-disconnected { background: #fee2e2; color: #dc2626; }
  .s-connecting { background: #fef9c3; color: #ca8a04; }
  @media (prefers-color-scheme: dark) {
    .s-connected { background: #14532d; color: #86efac; }
    .s-disconnected { background: #450a0a; color: #fca5a5; }
    .s-connecting { background: #422006; color: #fde68a; }
  }

  /* Search bar in header */
  #msg-search-wrap { display: none; flex: 1; align-items: center; gap: 6px; }
  #msg-search-wrap.visible { display: flex; }
  #msg-search-input { flex: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: 7px; padding: 7px 10px; color: var(--text); font-size: 13px; outline: none; }
  #msg-search-input:focus { border-color: var(--accent); }
  #msg-search-count { font-size: 12px; color: var(--text2); white-space: nowrap; }
  #msg-search-close { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 20px; line-height: 1; padding: 0 4px; }

  /* ── Empty / welcome state ──────────────────────────────────── */
  #empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--text2); padding: 24px; text-align: center; }
  #empty-state .big-icon { font-size: 52px; }
  #empty-state p { font-size: 14px; line-height: 1.5; }

  /* ── Messages ───────────────────────────────────────────────── */
  #messages { flex: 1; overflow-y: auto; padding: 10px 14px; display: flex; flex-direction: column; gap: 2px; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
  #messages::-webkit-scrollbar { width: 5px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  #load-more-btn { display: none; align-self: center; background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; color: var(--text2); cursor: pointer; font-size: 12px; padding: 6px 16px; margin: 4px 0 8px; flex-shrink: 0; }
  #load-more-btn:active { background: var(--bg2); }
  #load-more-spinner { display: none; align-self: center; font-size: 12px; color: var(--text2); margin: 6px 0; }
  .date-divider { text-align: center; font-size: 11px; color: var(--text2); padding: 8px 0 4px; }
  .msg { padding: 4px 8px; border-radius: 8px; transition: background 0.12s; }
  .msg:hover { background: var(--bg2); }
  .msg.highlighted { background: var(--highlight) !important; }
  .msg.dim { opacity: 0.25; }
  .msg-header { display: flex; align-items: baseline; gap: 8px; }
  .msg-author { font-weight: 700; font-size: 13px; }
  .msg-time { font-size: 11px; color: var(--text2); }
  .msg-body { margin-top: 2px; }
  .msg-text { font-size: 14px; line-height: 1.55; word-break: break-word; }
  .reply-quote { background: var(--reply-bg); border-left: 3px solid var(--reply-border); padding: 4px 8px; border-radius: 0 5px 5px 0; margin-bottom: 4px; font-size: 12px; color: var(--text2); cursor: pointer; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .reply-quote strong { color: var(--accent); margin-right: 4px; }
  .msg-actions { display: none; margin-top: 3px; }
  .msg:hover .msg-actions, .msg:focus-within .msg-actions { display: flex; gap: 4px; }
  .msg-action { background: var(--bg3); border: none; border-radius: 5px; color: var(--text2); cursor: pointer; font-size: 12px; padding: 3px 10px; -webkit-tap-highlight-color: transparent; }
  .msg-action:hover, .msg-action:active { background: var(--accent); color: #fff; }
  .msg-edited { font-size: 10px; color: var(--text2); margin-left: 4px; }

  /* Inline edit */
  .edit-row { display: flex; gap: 6px; margin-top: 4px; align-items: flex-end; }
  .edit-textarea { flex: 1; background: var(--bg2); border: 1.5px solid var(--accent); border-radius: 8px; color: var(--text); font-size: 14px; font-family: inherit; line-height: 1.5; outline: none; padding: 6px 10px; resize: none; max-height: 100px; }
  .edit-save { background: var(--accent); border: none; border-radius: 7px; color: #fff; cursor: pointer; font-size: 12px; font-weight: 700; padding: 5px 12px; white-space: nowrap; }
  .edit-cancel { background: var(--bg3); border: none; border-radius: 7px; color: var(--text2); cursor: pointer; font-size: 12px; padding: 5px 10px; }

  /* Mobile: always show action buttons (touch users can't hover) */
  @media (max-width: 700px) { .msg-actions { display: flex; } }

  /* ── Typing ─────────────────────────────────────────────────── */
  #typing-bar { min-height: 18px; padding: 0 22px 2px; font-size: 12px; color: var(--text2); font-style: italic; }

  /* ── Reply preview ──────────────────────────────────────────── */
  #reply-preview { display: none; align-items: center; gap: 8px; padding: 8px 14px; background: var(--reply-bg); border-top: 1px solid var(--reply-border); flex-shrink: 0; }
  #reply-preview.visible { display: flex; }
  #reply-text { flex: 1; font-size: 12px; color: var(--text2); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  #reply-text strong { color: var(--accent); }
  #reply-cancel { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 22px; line-height: 1; flex-shrink: 0; }

  /* ── Input area ─────────────────────────────────────────────── */
  #input-wrap { padding: 10px 12px calc(10px + var(--safe-bottom)); border-top: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
  #input-row { display: flex; align-items: flex-end; gap: 6px; background: var(--bg2); border: 1.5px solid var(--border); border-radius: 12px; padding: 6px 8px; transition: border-color 0.15s; }
  #input-row:focus-within { border-color: var(--accent); }
  #msg-input { flex: 1; background: none; border: none; color: var(--text); font-size: 15px; outline: none; resize: none; max-height: 110px; min-height: 26px; line-height: 1.5; font-family: inherit; }
  #msg-input::placeholder { color: var(--text2); }
  #emoji-toggle { background: none; border: none; cursor: pointer; font-size: 22px; padding: 1px 3px; line-height: 1; -webkit-tap-highlight-color: transparent; }
  #emoji-toggle:hover { opacity: 0.75; }
  #send-btn { background: var(--accent); border: none; border-radius: 8px; color: #fff; cursor: pointer; padding: 7px 14px; font-size: 14px; font-weight: 700; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
  #send-btn:active { background: var(--accent-hover); }

  /* ── Emoji picker ───────────────────────────────────────────── */
  #emoji-picker {
    display: none; position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--emoji-bg); border-top: 1px solid var(--border);
    padding: 12px 12px calc(12px + var(--safe-bottom));
    box-shadow: 0 -4px 20px var(--shadow); z-index: 300;
    border-radius: 16px 16px 0 0; max-height: 50vh; overflow: hidden; display: none; flex-direction: column;
  }
  #emoji-picker.open { display: flex; }
  #emoji-search { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 14px; outline: none; margin-bottom: 8px; flex-shrink: 0; }
  #emoji-scroll { overflow-y: auto; flex: 1; }
  .e-cat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text2); padding: 6px 2px 3px; letter-spacing: 0.06em; }
  .e-grid { display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 4px; }
  .e-btn { background: none; border: none; font-size: 24px; cursor: pointer; padding: 4px; border-radius: 6px; line-height: 1; -webkit-tap-highlight-color: transparent; }
  .e-btn:hover, .e-btn:active { background: var(--bg3); }

  /* ── Email overlay ──────────────────────────────────────────── */
  #email-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 500; padding: 24px; }
  .login-card { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; max-width: 320px; }
  .login-card .icon { font-size: 48px; }
  .login-card h2 { font-size: 22px; font-weight: 800; }
  .login-card p { font-size: 13px; color: var(--text2); text-align: center; line-height: 1.5; }
  #email-in { background: var(--bg2); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-size: 16px; outline: none; width: 100%; }
  #email-in:focus { border-color: var(--accent); }
  #email-go { background: var(--accent); border: none; border-radius: 10px; color: #fff; cursor: pointer; font-size: 16px; font-weight: 700; padding: 12px; width: 100%; -webkit-tap-highlight-color: transparent; }
  #email-go:active { background: var(--accent-hover); }

  /* ── Overlay backdrop (mobile sidebar) ─────────────────────── */
  #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 90; }

  /* ── Mobile ─────────────────────────────────────────────────── */
  @media (max-width: 700px) {
    #sidebar {
      position: fixed; inset: 0 auto 0 0; width: 82vw; max-width: 320px;
      z-index: 100; transform: translateX(-100%); box-shadow: 4px 0 24px var(--shadow);
    }
    #sidebar.open { transform: translateX(0); }
    #overlay.show { display: block; }
    #menu-btn { display: block; }
    #back-btn { display: block; }
    #header-search-btn span { display: none; } /* hide "Search" label on small screens */
    /* When in conversation view, show back+avatar; when in empty state show menu */
    #back-btn.hidden { display: none; }
    #menu-btn.hidden { display: none; }
  }
</style>
</head>
<body>

<!-- Email login -->
<div id="email-overlay">
  <div class="login-card">
    <div class="icon">💬</div>
    <h2>Chat</h2>
    <p>Enter your email to get started.<br>We'll remember you on this device.</p>
    <input id="email-in" type="email" placeholder="you@example.com" autocomplete="email" inputmode="email" />
    <button id="email-go">Continue →</button>
  </div>
</div>

<!-- Mobile sidebar backdrop -->
<div id="overlay"></div>

<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">
      <span style="font-size:20px">💬</span>
      <h1>Chat</h1>
      <div id="my-email-chip">—</div>
    </div>

    <div class="search-box">
      <input id="user-search" type="email" placeholder="Find by email…" autocomplete="off" inputmode="email" />
      <button id="search-go">Chat</button>
    </div>
    <div id="search-result"></div>

    <div class="section-label">People</div>
    <div id="people-list" style="flex:1;overflow-y:auto"><div class="empty-list">No contacts yet — search by email above to start a chat</div></div>
  </div>

  <!-- Main -->
  <div id="main">
    <!-- Header -->
    <div id="header">
      <button id="back-btn" class="hidden" aria-label="Back">‹</button>
      <button id="menu-btn" aria-label="Menu">☰</button>
      <div id="header-avatar" style="display:none"></div>
      <div id="header-info" style="display:none">
        <div id="header-email"></div>
        <div id="header-status">Offline</div>
      </div>
      <div id="msg-search-wrap">
        <input id="msg-search-input" type="text" placeholder="Search messages…" autocomplete="off" />
        <span id="msg-search-count"></span>
        <button id="msg-search-close">×</button>
      </div>
      <button id="header-search-btn" style="display:none"><span>🔍</span></button>
      <span id="conn-status" class="s-connecting">Connecting…</span>
    </div>

    <!-- Empty state -->
    <div id="empty-state">
      <div class="big-icon">💬</div>
      <p>Tap <strong>☰</strong> to see your contacts and start a conversation</p>
    </div>

    <!-- Load-more bar (separate from messages so innerHTML clear is safe) -->
    <div id="load-more-bar" style="display:none;justify-content:center;padding:6px 0;flex-shrink:0">
      <button id="load-more-btn" style="background:var(--bg3);border:1px solid var(--border);border-radius:20px;color:var(--text2);cursor:pointer;font-size:12px;padding:6px 18px">↑ Load older messages</button>
      <span id="load-more-spinner" style="display:none;font-size:12px;color:var(--text2);padding:6px 0">Loading…</span>
    </div>

    <!-- Message area -->
    <div id="messages" style="display:none"></div>
    <div id="typing-bar" style="display:none"></div>
    <div id="reply-preview">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" style="flex-shrink:0"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>
      <div id="reply-text"></div>
      <button id="reply-cancel" aria-label="Cancel reply">×</button>
    </div>
    <div id="input-wrap" style="display:none">
      <div id="input-row">
        <textarea id="msg-input" placeholder="Message…" rows="1"></textarea>
        <button id="emoji-toggle" aria-label="Emoji">😊</button>
        <button id="send-btn">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- Emoji picker (bottom sheet) -->
<div id="emoji-picker" role="dialog" aria-label="Emoji picker">
  <input id="emoji-search" type="text" placeholder="Search emoji…" autocomplete="off" />
  <div id="emoji-scroll"></div>
</div>

<script>
// ── Constants ────────────────────────────────────────────────────
const COLORS = ['#4f9ef8','#f87171','#34d399','#fbbf24','#a78bfa','#f472b6','#38bdf8','#fb923c'];
const EMOJIS = {
  'Smileys': ['😀','😃','😄','😁','😆','😅','😂','🤣','😊','😇','🙂','😉','😍','🥰','😘','😋','😎','🥳','😏','😔','😢','😭','😤','😠'],
  'Gestures': ['👋','🤚','✋','👌','✌️','🤞','👍','👎','👏','🙌','🤝','🙏','💪','🤙','☝️'],
  'Hearts': ['❤️','🧡','💛','💚','💙','💜','🖤','💔','💕','💞','💓','💗','💖','💘','💝'],
  'Nature': ['🌸','🌺','🌻','🌹','🌿','🍀','🐶','🐱','🐻','🐼','🦊','🦁','🐸','🦋','🌈'],
  'Food': ['🍎','🍊','🍋','🍇','🍓','🍔','🍟','🍕','🌮','🍜','🍣','🍩','🍪','🎂','☕','🧋'],
  'Symbols': ['✅','❌','⭐','🔥','💯','🎉','🎊','🙈','💡','🚀','✈️','🎵','🎶','💻','📱'],
};
const ALL_EMOJIS = Object.values(EMOJIS).flat();

// ── State ─────────────────────────────────────────────────────────
let ws = null;
let myEmail = localStorage.getItem('chat_email') || null;
let currentChat = null;
let onlineUsers = [];
let replyTo = null;
let typingTimer = null;
let isTyping = false;
let searchActive = false;
let searchQuery = '';
let searchMatches = [];
let searchIdx = 0;
let lastDate = null;
let oldestTimestamp = null;  // for pagination
let hasMoreHistory = false;
let loadingMore = false;

// ── Helpers ───────────────────────────────────────────────────────
const $= id => document.getElementById(id);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtTime = ts => new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
function fmtDate(ts) {
  const d = new Date(ts), now = new Date();
  if (d.toDateString()===now.toDateString()) return 'Today';
  const y = new Date(now); y.setDate(y.getDate()-1);
  if (d.toDateString()===y.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([],{month:'short',day:'numeric'});
}
function colorFor(email) {
  let h=0; for(const c of email) h=(h*31+c.charCodeAt(0))&0xffffffff;
  return COLORS[Math.abs(h)%COLORS.length];
}
function initials(email) { return (email||'?')[0].toUpperCase(); }

// ── Login ─────────────────────────────────────────────────────────
const overlay = $('email-overlay');
if (myEmail) overlay.style.display='none';
function doLogin() {
  const v=($('email-in').value||'').trim().toLowerCase();
  if(!v||!v.includes('@')) { $('email-in').style.borderColor='#f87171'; return; }
  myEmail=v; localStorage.setItem('chat_email',v);
  overlay.style.display='none';
  $('my-email-chip').textContent=myEmail;
  connect();
}
$('email-go').onclick=doLogin;
$('email-in').onkeydown=e=>{ if(e.key==='Enter') doLogin(); };

// ── WebSocket ─────────────────────────────────────────────────────
function connect() {
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(`${proto}//${location.host}`);
  setStatus('connecting');
  ws.onopen=()=>{ setStatus('connected'); ws.send(JSON.stringify({type:'join',email:myEmail})); };
  ws.onclose=()=>{ setStatus('disconnected'); setTimeout(connect,2500); };
  ws.onerror=()=>ws.close();
  ws.onmessage=e=>{
    const d=JSON.parse(e.data);
    switch(d.type){
      case 'conversations': renderConvos(d.conversations); break;
      case 'online_users': renderOnline(d.users); break;
      case 'history': if(d.with===currentChat) { if(d.isPagination) prependHistory(d.messages,d.hasMore); else renderHistory(d.messages,d.hasMore); } break;
      case 'message': onMessage(d.message); break;
      case 'message_edited': applyEdit(d.message); break;
      case 'typing': onTyping(d); break;
      case 'search_result': onSearchResult(d); break;
    }
  };
}
function setStatus(s){
  const el=$('conn-status');
  el.className='s-'+s;
  el.textContent=s==='connected'?'● Online':s==='connecting'?'Connecting…':'○ Offline';
}
if(myEmail){ $('my-email-chip').textContent=myEmail; connect(); }

// ── Open chat ─────────────────────────────────────────────────────
function openChat(email) {
  if(!email||email===myEmail) return;
  const isNewChat = email !== currentChat;
  currentChat = email;
  clearReply();

  closeSidebar();

  // Sidebar active state
  document.querySelectorAll('.list-item').forEach(el=>
    el.classList.toggle('active', el.dataset.email===email));

  // Header
  const color=colorFor(email);
  const av=$('header-avatar');
  av.style.cssText=`display:flex;background:${color};width:32px;height:32px;border-radius:50%;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;`;
  av.textContent=initials(email);
  $('header-info').style.display='block';
  $('header-email').textContent=email;
  setHeaderOnline(onlineUsers.includes(email));
  $('header-search-btn').style.display='';
  $('back-btn').classList.remove('hidden');
  $('menu-btn').classList.add('hidden');

  // Show chat panels
  $('empty-state').style.display='none';
  $('load-more-bar').style.display='none';
  $('messages').style.display='flex';
  $('typing-bar').style.display='block';
  $('input-wrap').style.display='block';

  // Only reload history if switching to a different conversation
  if(isNewChat) {
    $('messages').innerHTML='';
    lastDate=null; oldestTimestamp=null; hasMoreHistory=false; loadingMore=false;
    if(ws&&ws.readyState===1) ws.send(JSON.stringify({type:'get_history',with:email}));
  }
  $('msg-input').focus();
}
function setHeaderOnline(online){
  const el=$('header-status');
  el.className=online?'online':'';
  el.textContent=online?'● Online':'○ Offline';
}

// ── Mobile sidebar ────────────────────────────────────────────────
function openSidebar(){ $('sidebar').classList.add('open'); $('overlay').classList.add('show'); }
function closeSidebar(){ $('sidebar').classList.remove('open'); $('overlay').classList.remove('show'); }
$('menu-btn').onclick=openSidebar;
$('overlay').onclick=closeSidebar;
$('back-btn').onclick=()=>{
  if(window.innerWidth<=700){
    $('empty-state').style.display='flex';
    $('load-more-bar').style.display='none';
    $('messages').style.display='none';
    $('typing-bar').style.display='none';
    $('input-wrap').style.display='none';
    $('reply-preview').classList.remove('visible');
    $('header-info').style.display='none';
    $('header-avatar').style.display='none';
    $('header-search-btn').style.display='none';
    $('back-btn').classList.add('hidden');
    $('menu-btn').classList.remove('hidden');
    // Don't reset currentChat — so re-entering same chat doesn't reload
    openSidebar();
  } else {
    openSidebar();
  }
};

// ── Render messages ───────────────────────────────────────────────
function renderHistory(msgs, hasMore) {
  $('messages').innerHTML='';   // safe simple clear — controls are outside
  lastDate=null;
  msgs.forEach(addMsg);
  if(msgs.length) oldestTimestamp=msgs[0].timestamp;
  setHasMore(!!hasMore);
  scrollBottom();
  if(searchActive&&searchQuery) applySearch();
}
function prependHistory(msgs, hasMore) {
  if(!msgs.length){ loadingMore=false; setLoadingSpinner(false); return; }
  const el=$('messages');
  const prevHeight=el.scrollHeight;
  const frag=document.createDocumentFragment();
  const savedLastDate=lastDate; lastDate=null;
  msgs.forEach(msg=>{
    const dateStr=fmtDate(msg.timestamp);
    if(dateStr!==lastDate){
      lastDate=dateStr;
      const d=document.createElement('div'); d.className='date-divider'; d.textContent=dateStr;
      frag.appendChild(d);
    }
    frag.appendChild(buildMsgEl(msg));
  });
  lastDate=savedLastDate;
  el.insertBefore(frag, el.firstChild);
  el.scrollTop+=el.scrollHeight-prevHeight;  // no jump
  oldestTimestamp=msgs[0].timestamp;
  setHasMore(!!hasMore);
  setLoadingSpinner(false);
  loadingMore=false;
}
function setHasMore(val){
  hasMoreHistory=val;
  $('load-more-bar').style.display=val?'flex':'none';
  $('load-more-btn').style.display=val?'':'none';
  $('load-more-spinner').style.display='none';
}
function setLoadingSpinner(val){
  $('load-more-bar').style.display='flex';
  $('load-more-spinner').style.display=val?'':'none';
  $('load-more-btn').style.display=val?'none':'';
}
function loadOlderMessages(){
  if(loadingMore||!hasMoreHistory||!currentChat||!ws||ws.readyState!==1) return;
  loadingMore=true;
  setLoadingSpinner(true);
  ws.send(JSON.stringify({type:'get_history',with:currentChat,before:oldestTimestamp}));
}
$('load-more-btn').onclick=loadOlderMessages;
$('messages').addEventListener('scroll',()=>{
  if($('messages').scrollTop<60&&hasMoreHistory&&!loadingMore) loadOlderMessages();
});
function addMsg(msg) {
  const dateStr=fmtDate(msg.timestamp);
  if(dateStr!==lastDate){
    lastDate=dateStr;
    const div=document.createElement('div');
    div.className='date-divider'; div.textContent=dateStr;
    $('messages').appendChild(div);
  }
  $('messages').appendChild(buildMsgEl(msg));
}
function buildMsgEl(msg){
  const isMe=msg.from===myEmail;
  const el=document.createElement('div');
  el.className='msg'; el.dataset.id=msg.id; el.tabIndex=-1;
  let html='';
  if(msg.replyTo){
    html+=`<div class="reply-quote" data-ref="${esc(msg.replyTo.id)}"><strong>↩ ${esc(msg.replyTo.author||msg.replyTo.from)}</strong>${esc((msg.replyTo.text||'').slice(0,80))}${(msg.replyTo.text||'').length>80?'…':''}</div>`;
  }
  html+=`<div class="msg-header"><span class="msg-author" style="color:${colorFor(msg.from)}">${esc(isMe?'You':msg.from)}</span><span class="msg-time">${fmtTime(msg.timestamp)}</span>${msg.editedAt?'<span class="msg-edited">(edited)</span>':''}</div>`;
  const editBtn=isMe?'<button class="msg-action edit-btn">✏️ Edit</button>':'';
  html+=`<div class="msg-body"><div class="msg-text">${esc(msg.text)}</div><div class="msg-actions"><button class="msg-action reply-btn">↩ Reply</button>${editBtn}</div></div>`;
  el.innerHTML=html;
  el.querySelector('.reply-btn').onclick=()=>startReply(msg);
  if(isMe) el.querySelector('.edit-btn').onclick=()=>startEdit(el, msg);
  const q=el.querySelector('.reply-quote');
  if(q) q.onclick=()=>jumpTo(q.dataset.ref);
  return el;
}
function startEdit(el, msg) {
  // Don't open two editors at once
  if(el.querySelector('.edit-row')) return;
  const body=el.querySelector('.msg-body');
  const textEl=el.querySelector('.msg-text');
  textEl.style.display='none';
  el.querySelector('.msg-actions').style.display='none';
  const row=document.createElement('div'); row.className='edit-row';
  const ta=document.createElement('textarea'); ta.className='edit-textarea';
  ta.value=msg.text; ta.rows=1;
  ta.oninput=()=>{ ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,100)+'px'; };
  const save=document.createElement('button'); save.className='edit-save'; save.textContent='Save';
  const cancel=document.createElement('button'); cancel.className='edit-cancel'; cancel.textContent='Cancel';
  row.append(ta,save,cancel); body.appendChild(row);
  ta.focus(); ta.setSelectionRange(ta.value.length,ta.value.length);
  ta.dispatchEvent(new Event('input')); // auto-size
  ta.onkeydown=e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();save.click();} if(e.key==='Escape') cancel.click(); };
  save.onclick=()=>{
    const newText=ta.value.trim();
    if(newText&&newText!==msg.text&&ws&&ws.readyState===1){
      ws.send(JSON.stringify({type:'edit_message',id:msg.id,text:newText}));
    }
    cancelEdit(el,textEl,row);
  };
  cancel.onclick=()=>cancelEdit(el,textEl,row);
}
function cancelEdit(el,textEl,row){
  row.remove(); textEl.style.display='';
  const actions=el.querySelector('.msg-actions'); if(actions) actions.style.display='';
}
function applyEdit(edited){
  const el=$('messages').querySelector(`[data-id="${edited.id}"]`);
  if(!el) return;
  const textEl=el.querySelector('.msg-text');
  if(textEl) textEl.textContent=edited.text;
  // Add/update (edited) label
  let label=el.querySelector('.msg-edited');
  if(!label){ label=document.createElement('span'); label.className='msg-edited'; label.textContent='(edited)'; el.querySelector('.msg-time')?.after(label); }
  // Update stored msg reference for re-edits (update edit-btn handler)
  el.querySelector('.edit-btn')?.remove();
  const actions=el.querySelector('.msg-actions');
  if(actions){
    const btn=document.createElement('button'); btn.className='msg-action edit-btn'; btn.textContent='✏️ Edit';
    btn.onclick=()=>startEdit(el,edited); actions.appendChild(btn);
  }
}
function onMessage(msg) {
  const other=msg.from===myEmail?msg.to:msg.from;
  if(other===currentChat){ addMsg(msg); scrollIfNear(); if(searchActive&&searchQuery) applySearch(); }
  refreshConvos();
}
function scrollBottom(){ const m=$('messages'); m.scrollTop=m.scrollHeight; }
function scrollIfNear(){
  const m=$('messages'); if(m.scrollHeight-m.scrollTop-m.clientHeight<140) scrollBottom();
}
function jumpTo(id){
  const t=$('messages').querySelector(`[data-id="${id}"]`);
  if(!t) return;
  t.scrollIntoView({behavior:'smooth',block:'center'});
  t.classList.add('highlighted'); setTimeout(()=>t.classList.remove('highlighted'),2000);
}

// ── Render people list (online + offline contacts merged) ─────────
let _convos = [];

function renderConvos(convos) {
  _convos = convos;
  renderPeople();
}
function renderOnline(users) {
  onlineUsers = users.filter(u=>u!==myEmail);
  renderPeople();
  if(currentChat) setHeaderOnline(onlineUsers.includes(currentChat));
}
function renderPeople() {
  const el=$('people-list');
  const seen=new Set();
  const items=[];
  // Conversation contacts first (most recent first)
  _convos.forEach(c=>{ seen.add(c.with); items.push({email:c.with, convo:c}); });
  // Online users not yet in list
  onlineUsers.forEach(email=>{ if(!seen.has(email)){ seen.add(email); items.push({email, convo:null}); } });

  if(!items.length){ el.innerHTML='<div class="empty-list">No contacts yet — search by email above to start a chat</div>'; return; }
  el.innerHTML='';
  items.forEach(({email,convo})=>{
    const isOnline=onlineUsers.includes(email);
    const color=colorFor(email);
    const div=document.createElement('div');
    div.className='list-item'; div.dataset.email=email;
    if(email===currentChat) div.classList.add('active');
    const dot=isOnline
      ? '<div class="online-dot"></div>'
      : '<div class="offline-dot" title="Offline — message will be delivered when they come online"></div>';
    let sub='', time='';
    if(convo){
      const isMe=convo.lastMessage.from===myEmail;
      sub=`${isMe?'You: ':''}${esc((convo.lastMessage.text||'').slice(0,36))}`;
      time=`<div class="item-time">${fmtTime(convo.lastMessage.timestamp)}</div>`;
    } else {
      sub=isOnline?'Tap to chat':'';
    }
    div.innerHTML=`<div class="avatar" style="background:${color}">${initials(email)}</div><div class="item-info"><div class="item-email">${esc(email)}</div><div class="item-sub">${sub}</div></div>${time}${dot}`;
    div.onclick=()=>openChat(email);
    el.appendChild(div);
  });
}
function refreshConvos(){
  if(ws&&ws.readyState===1) ws.send(JSON.stringify({type:'join',email:myEmail}));
}

// ── Search user ───────────────────────────────────────────────────
$('search-go').onclick=doUserSearch;
$('user-search').onkeydown=e=>{ if(e.key==='Enter') doUserSearch(); };
function doUserSearch(){
  const email=($('user-search').value||'').trim().toLowerCase();
  if(!email||!email.includes('@')) return;
  if(ws&&ws.readyState===1) ws.send(JSON.stringify({type:'search_user',email}));
}
function onSearchResult(d){
  const label=d.online?'🟢 Online':d.known?'⚪ Known user':'❓ Unknown';
  $('search-result').innerHTML=`${esc(d.email)} — ${label} &nbsp;<a onclick="openChat('${esc(d.email)}');$('user-search').value='';$('search-result').innerHTML=''">Start chat →</a>`;
}

// ── Reply ─────────────────────────────────────────────────────────
function startReply(msg){
  replyTo=msg;
  const label=msg.from===myEmail?'You':msg.from;
  $('reply-text').innerHTML=`<strong>${esc(label)}</strong>: ${esc((msg.text||'').slice(0,80))}`;
  $('reply-preview').classList.add('visible');
  $('msg-input').focus();
}
function clearReply(){ replyTo=null; $('reply-preview').classList.remove('visible'); }
$('reply-cancel').onclick=clearReply;

// ── Send ──────────────────────────────────────────────────────────
function sendMsg(){
  const text=($('msg-input').value||'').trim();
  if(!text||!ws||ws.readyState!==1||!currentChat) return;
  ws.send(JSON.stringify({type:'message',to:currentChat,text,
    replyTo:replyTo?{id:replyTo.id,from:replyTo.from,author:replyTo.from===myEmail?'You':replyTo.from,text:replyTo.text}:null}));
  $('msg-input').value=''; $('msg-input').style.height='auto';
  clearReply(); stopTyping();
}
$('send-btn').onclick=sendMsg;
$('msg-input').onkeydown=e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();} };
$('msg-input').oninput=()=>{
  const el=$('msg-input'); el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,110)+'px';
  handleTyping();
};

// ── Typing ────────────────────────────────────────────────────────
function handleTyping(){
  if(!ws||ws.readyState!==1||!currentChat) return;
  if(!isTyping){ isTyping=true; ws.send(JSON.stringify({type:'typing',to:currentChat,isTyping:true})); }
  clearTimeout(typingTimer); typingTimer=setTimeout(stopTyping,2000);
}
function stopTyping(){
  clearTimeout(typingTimer);
  if(isTyping&&ws&&ws.readyState===1&&currentChat){
    isTyping=false; ws.send(JSON.stringify({type:'typing',to:currentChat,isTyping:false}));
  }
}
function onTyping(d){
  if(d.from!==currentChat) return;
  $('typing-bar').textContent=d.isTyping?`${esc(d.from)} is typing…`:'';
}

// ── Message search ────────────────────────────────────────────────
$('header-search-btn').onclick=()=>toggleMsgSearch(true);
$('msg-search-close').onclick=()=>toggleMsgSearch(false);
function toggleMsgSearch(open){
  searchActive=open; $('msg-search-wrap').classList.toggle('visible',open);
  if(open){ $('msg-search-input').focus(); } else { searchQuery=''; applySearch(); $('msg-search-input').value=''; }
}
$('msg-search-input').oninput=()=>{ searchQuery=$('msg-search-input').value.trim().toLowerCase(); applySearch(); };
$('msg-search-input').onkeydown=e=>{
  if(e.key==='Enter'&&searchMatches.length){ searchIdx=(searchIdx+1)%searchMatches.length; highlightMatch(); }
  if(e.key==='Escape') toggleMsgSearch(false);
};
function applySearch(){
  const msgs=$('messages').querySelectorAll('.msg');
  searchMatches=[]; searchIdx=0;
  if(!searchQuery){ msgs.forEach(m=>m.classList.remove('dim','highlighted')); $('msg-search-count').textContent=''; return; }
  msgs.forEach(m=>{
    const txt=(m.querySelector('.msg-text')?.textContent||'').toLowerCase()+(m.querySelector('.msg-author')?.textContent||'').toLowerCase();
    if(txt.includes(searchQuery)){ m.classList.remove('dim'); searchMatches.push(m); } else { m.classList.add('dim'); m.classList.remove('highlighted'); }
  });
  $('msg-search-count').textContent=searchMatches.length?`${searchMatches.length} result${searchMatches.length!==1?'s':''}`:' No results';
  if(searchMatches.length) highlightMatch();
}
function highlightMatch(){
  searchMatches.forEach((m,i)=>m.classList.toggle('highlighted',i===searchIdx));
  searchMatches[searchIdx]?.scrollIntoView({behavior:'smooth',block:'center'});
}

// ── Emoji picker ──────────────────────────────────────────────────
function buildEmoji(filter=''){
  const s=$('emoji-scroll'); s.innerHTML='';
  if(filter){
    const f=filter.toLowerCase();
    const grid=document.createElement('div'); grid.className='e-grid';
    ALL_EMOJIS.slice(0,80).forEach(e=>grid.appendChild(mkEBtn(e)));
    s.appendChild(grid); return;
  }
  for(const [cat,emojis] of Object.entries(EMOJIS)){
    const lbl=document.createElement('div'); lbl.className='e-cat-label'; lbl.textContent=cat;
    const grid=document.createElement('div'); grid.className='e-grid';
    emojis.forEach(e=>grid.appendChild(mkEBtn(e)));
    s.appendChild(lbl); s.appendChild(grid);
  }
}
function mkEBtn(emoji){
  const btn=document.createElement('button'); btn.className='e-btn'; btn.textContent=emoji;
  btn.onclick=()=>{
    const inp=$('msg-input'), ss=inp.selectionStart, se=inp.selectionEnd;
    inp.value=inp.value.slice(0,ss)+emoji+inp.value.slice(se);
    inp.selectionStart=inp.selectionEnd=ss+emoji.length; inp.focus();
  };
  return btn;
}
$('emoji-toggle').onclick=e=>{
  e.stopPropagation();
  const picker=$('emoji-picker');
  const open=picker.classList.toggle('open');
  if(open){ buildEmoji(); $('emoji-search').value=''; $('emoji-search').focus(); }
};
$('emoji-search').oninput=()=>buildEmoji($('emoji-search').value.trim());
document.addEventListener('click',e=>{
  const picker=$('emoji-picker');
  if(picker.classList.contains('open')&&!picker.contains(e.target)&&e.target!==$('emoji-toggle'))
    picker.classList.remove('open');
});
</script>
